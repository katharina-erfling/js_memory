<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/confetti.js" defer></script>
    <script src="js/script.js" defer></script>
    <title>Memory</title>
</head>
<body>

<div class="header">
  <h1>Memory</h1>
  <div class="stats">
    <div class="stat-block">
      <span class="stat-label">Züge</span>
      <span class="stat-wert" id="zuege">—</span>
    </div>
    <span class="stat-trenner">✦</span>
    <div class="stat-block">
      <span class="stat-label">Zeit</span>
      <span class="stat-wert" id="timer">0:00</span>
    </div>
  </div>
</div>

<div class="inhalt">
  <div class="div-flex">

    <div class="spielfeld">
      <div class="grid" id="grid"></div>
    </div>

    <div class="bestenliste">
      <div class="notizblock">
        <div class="notizblock-lochung">
          <span></span><span></span><span></span>
        </div>
        <h2 class="notizblock-titel">Bestenliste</h2>
        <ol class="bestenliste-eintraege" id="bestenliste-eintraege">
          <li class="eintrag leer">Noch keine Einträge</li>
        </ol>
      </div>
    </div>

  </div>
</div>

<div id="gewinnscreen">
  <div class="gewinn-panel">
    <p class="gewinn-titel">Gewonnen!</p>
    <p class="gewinn-untertitel">Alle Paare gefunden</p>
    <div class="gewinn-zuege">Züge:
      <span id="zuege-zahl">—</span>
    </div>
    <div class="gewinn-zuege">Zeit:
      <span id="timer_ende">0:00</span>
    </div>
    <hr class="gewinn-linie">
    <button class="gewinn-button" id="new_game">
      Nochmal spielen
    </button>
  </div>
</div>

</body>
</html>
